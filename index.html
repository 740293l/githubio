<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人主页 | Personal Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    :root {
      --main: #AFB8C1;
      --sub1: #8A9BA8;
      --sub2: #6B7D8C;
      --sub3: #2D3740;
      --light: #F5F7F9;
      --dark: #1A2026;
    }

    body {
      background-color: var(--light);
      color: var(--dark);
      line-height: 1.6;
      background: linear-gradient(135deg, #F7F8FA 0%, #E4E9EE 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 50px 40px;
      box-shadow: 0 8px 30px rgba(107, 125, 140, 0.12);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .avatar {
      width: 180px;
      height: 180px;
      margin: 0 auto 25px;
      background: linear-gradient(160deg, var(--main), var(--sub1));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 70px;
      box-shadow: 0 0 25px rgba(175, 184, 193, 0.4);
    }

    h1 {
      font-size: 28px;
      color: var(--sub3);
      margin-bottom: 10px;
    }

    .tag {
      display: inline-block;
      background: var(--main);
      color: white;
      padding: 5px 14px;
      border-radius: 30px;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .section {
      text-align: left;
      margin: 30px 0;
      padding-left: 10px;
      border-left: 3px solid var(--sub1);
    }

    .section h2 {
      font-size: 18px;
      color: var(--sub2);
      margin-bottom: 10px;
    }

    .section p {
      color: #444;
      font-size: 15px;
    }

    .links {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .links a {
      padding: 10px 20px;
      border-radius: 10px;
      background: var(--sub3);
      color: white;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .links a:hover {
      background: var(--sub2);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      color: var(--main);
      font-size: 13px;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <!-- 3D女生头像区域 -->
      <div class="avatar">👩‍💻</div>

      <h1>你的名字</h1>
      <div class="tag">恬静 · 科技 · 专注</div>

      <div class="section">
        <h2>关于我</h2>
        <p>喜欢安静、专注于技术与设计，追求简约、科技感的视觉风格，热爱创造与表达。</p>
      </div>

      <div class="section">
        <h2>我的风格</h2>
        <p>干净、现代、科技感、低饱和色调，注重细节与舒适体验。</p>
      </div>

      <div class="section">
        <h2>联系方式</h2>
        <p>邮箱：your-email@example.com</p>
      </div>

      <div class="links">
        <a href="#">GitHub</a>
        <a href="#">小红书</a>
        <a href="#">B站</a>
        <a href="#">博客</a>
      </div>
    </div>

    <footer>© 2025 Personal Website • Powered by GitHub Pages</footer>
  </div>
</body>
</html>
